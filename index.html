<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Ares · War Report Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --bg: #1a1010; --panel: #241818; --border: #3a2020;
            --text: #e0d0d0; --muted: #9a6a6a; --ares: #c0382a;
            --steel: #b05040; --gold: #c8943a; --broken: #c04040; --kept: #6b8e5a;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: var(--font-body); color: var(--text); min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .header { text-align: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.2rem; }
        .header h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--ares); letter-spacing: 3px; }
        .header h1 span { color: var(--text); }
        .header-sub { font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted); letter-spacing: 2px; margin-top: 0.3rem; }

        .status-bar { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 0.55rem; color: var(--muted); }
        .status-bar span { color: var(--text); font-size: 0.65rem; }

        .controls { display: flex; gap: 0.4rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
        button { font-family: var(--font-mono); font-size: 0.6rem; padding: 0.45rem 0.9rem; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--panel); color: var(--text); transition: all 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: var(--ares); color: #fff; border-color: var(--ares); }
        button.primary { background: var(--ares); color: #fff; border-color: var(--ares); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .spin { display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .vocab-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; margin-bottom: 1.5rem; }
        .vocab-title { font-family: var(--font-mono); font-size: 0.5rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 0.5rem; }
        .vocab-cloud { display: flex; flex-wrap: wrap; gap: 0.25rem; }
        .vocab-chip { font-family: var(--font-mono); font-size: 0.5rem; padding: 0.12rem 0.35rem; border-radius: 3px; background: rgba(192,56,42,0.1); color: #d08070; border: 1px solid rgba(192,56,42,0.2); }

        .reports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
        .report-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; border-left: 4px solid var(--ares); transition: all 0.2s; }
        .report-card.broken { border-left-color: var(--broken); opacity: 0.6; }
        .report-card.kept { border-left-color: var(--kept); }
        .report-card:hover { border-color: var(--steel); transform: translateY(-1px); }

        .report-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .report-triplet { font-family: var(--font-body); font-size: 0.85rem; font-style: italic; line-height: 1.4; margin-bottom: 0.5rem; }
        .report-verdict { font-family: var(--font-display); font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 3px; }
        .verdict-kept { background: rgba(107,142,90,0.2); color: var(--kept); }
        .verdict-broken { background: rgba(192,64,64,0.2); color: var(--broken); }

        .report-tests { font-family: var(--font-mono); font-size: 0.48rem; color: var(--muted); line-height: 1.4; margin-bottom: 0.4rem; }
        .report-tests .pass { color: var(--kept); }
        .report-tests .fail { color: var(--broken); }
        .report-stress { font-family: var(--font-display); font-size: 1rem; color: var(--ares); }

        .log { background: #0d0808; border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; max-height: 120px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.5rem; color: var(--muted); }
        .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }

        @media (max-width: 768px) { .reports-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>⚔️ A<span>RES</span></h1>
        <div class="header-sub">WAR REPORT ENGINE · DOMAIN: WAR · PYTHAGOREAN #3 · THE TRIAD</div>
    </div>

    <div class="status-bar">
        <div>Tokens claimed: <span id="tokenCount">—</span></div>
        <div>Tested: <span id="testedCount">—</span></div>
        <div>Broken: <span id="brokenCount">—</span></div>
        <div>Kept: <span id="keptCount">—</span></div>
    </div>

    <div class="vocab-panel">
        <div class="vocab-title">⚔️ MY WAR VOCABULARY</div>
        <div class="vocab-cloud" id="vocabCloud">Claim tokens from Hermes to build vocabulary.</div>
    </div>

    <div class="controls">
        <button id="claimBtn" class="primary">⚔️ Claim War Tokens</button>
        <button id="testBtn" disabled>⚔️ Stress Test All</button>
        <button id="dispatchBtn" disabled>📤 Send to Apollo</button>
    </div>

    <div class="reports-grid" id="reportsGrid">
        <div class="empty-state">Claim war tokens from Hermes, then stress-test.</div>
    </div>

    <div class="log" id="log"><div>⚔️ Ares waiting. The Triad hungers for stress.</div></div>

</div>

<script type="module">
const KAIROS_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const KAIROS_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const sb = window.supabase.createClient(KAIROS_URL, KAIROS_KEY);

let myVocab = [];
let warReports = [];

const WAR_SEEDS = new Set([
    'war','fight','destroy','shatter','clash','strike','blade','shield','battle',
    'rage','force','steel','blood','death','kill','crush','burn','break','attack',
    'defense','army','enemy','rival','conquest','victory','defeat','siege','combat',
    'assault','invasion','slaughter','carnage','fury','wrath','violence','power'
]);

function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
    while (el.children.length > 30) el.removeChild(el.lastChild);
}

// ════════════════════════════════════════════════
// CLAIM WAR TOKENS FROM HERMES
// ════════════════════════════════════════════════
async function claimTokens() {
    log('Claiming war tokens from Hermes...');
    document.getElementById('claimBtn').disabled = true;
    document.getElementById('claimBtn').innerHTML = '<span class="spin">⟳</span> Claiming...';

    const { data: tokens } = await sb.from('concepts')
        .select('*')
        .eq('domain', 'war')
        .eq('state', 'raw')
        .eq('band', 'hermes')
        .order('score', { ascending: false })
        .limit(40);

    if (!tokens?.length) {
        log('No war tokens available. Run Hermes → Seed All Domains first.');
        document.getElementById('claimBtn').disabled = false;
        document.getElementById('claimBtn').textContent = '⚔️ Claim War Tokens';
        return;
    }

    const scored = [];
    for (const t of tokens) {
        const word = (t.body || '').toLowerCase();
        const hardcodedBoost = WAR_SEEDS.has(word) ? 0.4 : 0;
        const seedSimilarity = myVocab.length > 0
            ? Math.max(...myVocab.map(v => v.word === word ? 0.5 : 0.1))
            : 0.2;
        const warScore = hardcodedBoost + seedSimilarity;
        scored.push({ word, warScore, id: t.id, wordType: t.word_type || '—' });
    }

    scored.sort((a, b) => b.warScore - a.warScore);
    const claimed = scored.slice(0, 20);

    for (const c of claimed) {
        if (!myVocab.find(v => v.word === c.word)) {
            myVocab.push({ word: c.word, warScore: c.warScore });
        }
        await sb.from('concepts').update({ state: 'claimed', realm: 'ares' }).eq('id', c.id);
    }

    document.getElementById('tokenCount').textContent = tokens.length;
    document.getElementById('testBtn').disabled = myVocab.length < 3;
    renderVocab();
    log(`Claimed ${claimed.length} war tokens. Vocabulary: ${myVocab.length} words.`);
    document.getElementById('claimBtn').disabled = false;
    document.getElementById('claimBtn').textContent = '⚔️ Claim War Tokens';
}

// ════════════════════════════════════════════════
// STRESS TEST ENGINE
// ════════════════════════════════════════════════
function stressTest(item) {
    const word = item.word || '';
    const score = item.warScore || 0.3;
    const tests = [];

    tests.push({
        name: 'War Seed',
        passed: WAR_SEEDS.has(word),
        detail: WAR_SEEDS.has(word) ? 'Core war vocabulary' : 'Not a seed word'
    });

    tests.push({
        name: 'Brutality',
        passed: word.length <= 8,
        detail: `${word.length} chars — ${word.length <= 8 ? 'Short and brutal' : 'Too long for war'}`
    });

    tests.push({
        name: 'Score Threshold',
        passed: score >= 0.25,
        detail: `Score ${(score*100).toFixed(0)}% — ${score >= 0.25 ? 'PASSES' : 'TOO WEAK'}`
    });

    tests.push({
        name: 'Hard Consonants',
        passed: /[kdtbgzrx]/.test(word),
        detail: /[kdtbgzrx]/.test(word) ? 'Sounds like war' : 'Too soft'
    });

    tests.push({
        name: 'Chaos Resistance',
        passed: Math.random() < (0.4 + score * 0.6),
        detail: 'Random survival roll'
    });

    const passedCount = tests.filter(t => t.passed).length;
    const survived = passedCount >= 3;

    return { ...item, tests, passedCount, survived, verdict: survived ? 'kept' : 'broken', stressScore: Math.round((passedCount / 5) * 100) };
}

// ════════════════════════════════════════════════
// TEST ALL
// ════════════════════════════════════════════════
async function testAll() {
    if (myVocab.length < 3) { log('Need at least 3 war words.'); return; }
    log('Stress-testing war vocabulary...');
    document.getElementById('testBtn').disabled = true;
    document.getElementById('testBtn').innerHTML = '<span class="spin">⟳</span> Testing...';
    warReports = myVocab.map(w => stressTest(w));

    warReports.sort((a, b) => b.stressScore - a.stressScore);
    const kept = warReports.filter(r => r.survived).length;
    const broken = warReports.filter(r => !r.survived).length;

    document.getElementById('testedCount').textContent = warReports.length;
    document.getElementById('brokenCount').textContent = broken;
    document.getElementById('keptCount').textContent = kept;
    document.getElementById('dispatchBtn').disabled = kept === 0;
    renderReports();
    log(`Tested: ${broken} broken, ${kept} kept.`);
    document.getElementById('testBtn').disabled = false;
    document.getElementById('testBtn').textContent = '⚔️ Stress Test All';
}

// ════════════════════════════════════════════════
// DISPATCH TO APOLLO
// ════════════════════════════════════════════════
async function dispatchToApollo() {
    const kept = warReports.filter(r => r.survived);
    if (!kept.length) return;
    log('Sending war reports to Apollo...');
    document.getElementById('dispatchBtn').disabled = true;
    document.getElementById('dispatchBtn').textContent = '📤 Sending...';

    let dispatched = 0;
    for (const report of kept) {
        const { error } = await sb.from('ares_dispatch').insert({
            triplet: report.word,
            stress_score: report.stressScore,
            tests_passed: report.passedCount,
            tests_total: 5,
            test_results: report.tests,
            item_type: 'word',
            consumed: false,
            created_at: new Date().toISOString()
        });
        if (!error) dispatched++;
    }

    document.getElementById('dispatchCount').textContent = dispatched;
    log(`${dispatched} war reports sent to Apollo.`);
    document.getElementById('dispatchBtn').disabled = false;
    document.getElementById('dispatchBtn').textContent = '📤 Send to Apollo';
}

function renderVocab() {
    document.getElementById('vocabCloud').innerHTML = myVocab.slice(0, 40).map(v =>
        `<span class="vocab-chip">${v.word}</span>`
    ).join('');
}

function renderReports() {
    const grid = document.getElementById('reportsGrid');
    if (!warReports.length) {
        grid.innerHTML = '<div class="empty-state">Claim war tokens and stress-test.</div>';
        return;
    }
    grid.innerHTML = warReports.map(r => `
        <div class="report-card ${r.verdict}">
            <div class="report-head">
                <span style="font-family:var(--font-mono);font-size:0.5rem;color:var(--muted);">word</span>
                <span class="report-verdict ${r.survived ? 'verdict-kept' : 'verdict-broken'}">${r.survived ? 'KEPT' : 'BROKEN'}</span>
            </div>
            <div class="report-triplet">${esc(r.word)}</div>
            <div class="report-tests">
                ${r.tests.map(t => `${t.passed ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'} ${t.name}: ${t.detail}`).join('<br>')}
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:0.5rem;">
                <span style="font-family:var(--font-mono);font-size:0.5rem;color:var(--muted);">${r.passedCount}/5</span>
                <span class="report-stress">${r.stressScore}</span>
            </div>
        </div>
    `).join('');
}

function esc(s) { return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

async function archiveSelf() {
    try {
        const html = document.documentElement.outerHTML;
        await sb.from('html').upsert({
            filename: 'ares.html', title: '⚔️ Ares · War Report Engine', type: 'olympian',
            content: html, description: 'Claims war tokens from Hermes by domain, stress-tests, dispatches survivors to Apollo',
            reads_from: ['concepts'], writes_to: ['ares_dispatch'],
            models_used: [],
            url: window.location.href, updated_at: new Date().toISOString()
        }, { onConflict: 'filename' });
    } catch {}
}

function init() {
    document.getElementById('claimBtn').onclick = claimTokens;
    document.getElementById('testBtn').onclick = testAll;
    document.getElementById('dispatchBtn').onclick = dispatchToApollo;
    setTimeout(archiveSelf, 3000);
    log('⚔️ Ares — Pythagorean #3. Claims war by domain.');
}
init();
</script>
</body>
</html>
