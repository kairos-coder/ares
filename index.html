<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARES · The Verb Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

        :root {
            --obsidian: #0a0606;
            --forge:    #1a0f0f;
            --blood:    #3a1a1a;
            --ares:     #c0382a;
            --ares-bright: #e84a38;
            --ember:    #e87850;
            --gold:     #d4a850;
            --ivory:    #e8d8d0;
            --muted:    #8a7060;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--obsidian);
            color: var(--ivory);
            font-family: 'Crimson Pro', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hero {
            height: 420px;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('assets/ares-hero.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--ares), var(--ember), var(--ares), transparent);
        }

        .header-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            color: var(--ares-bright);
            text-shadow: 0 0 60px rgba(232,74,56,0.8);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .stat-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 2.5rem 0;
            flex-wrap: wrap;
        }
        .stat-value { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--ares-bright); }
        .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.48rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

        .controls {
            text-align: center;
            margin: 2.5rem 0;
        }
        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 3px;
            padding: 1rem 2.2rem;
            margin: 0 0.6rem;
            background: transparent;
            color: var(--ivory);
            border: 2px solid var(--ares);
            cursor: pointer;
            transition: all 0.4s;
        }
        .btn:hover {
            background: var(--ares);
            color: white;
            box-shadow: 0 0 30px rgba(192,56,42,0.5);
        }

        .triplets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.2rem;
            margin-top: 2rem;
        }
        .triplet-card {
            background: linear-gradient(160deg, var(--forge), #1f1414);
            border: 1px solid #4a2a2a;
            padding: 1.4rem;
        }
        .svo {
            font-size: 1.25rem;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }
        .svo-verb { color: var(--ares-bright); font-weight: bold; }

        .log {
            margin-top: 2rem;
            background: rgba(10,6,6,0.9);
            border: 1px solid #3a1a1a;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.52rem;
            max-height: 220px;
            overflow-y: auto;
            color: var(--muted);
        }
    </style>
</head>
<body>

    <!-- HERO -->
    <div class="hero">
        <div>
            <div class="header-name">ARES</div>
            <p style="margin-top:1rem; font-size:1.1rem; letter-spacing:4px; color:#e87850;">THE VERB ENGINE • FORGER OF TRIPLETS</p>
        </div>
    </div>

    <div class="container">

        <div class="stat-bar">
            <div>
                <span class="stat-value" id="pairsCount">0</span>
                <div class="stat-label">Pairs Ready</div>
            </div>
            <div>
                <span class="stat-value" id="tripletsCount">0</span>
                <div class="stat-label">Triplets Forged</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="fetchBtn">⚔ CALL TO WAR — FETCH PAIRS</button>
        </div>

        <h3 style="text-align:center; margin:2rem 0 1rem; color:var(--ember); font-family:'Cinzel',serif; letter-spacing:3px;">RECENTLY FORGED TRIPLETS</h3>
        <div class="triplets-grid" id="tripletsGrid">
            <!-- Populated by JS -->
        </div>

        <div class="log" id="log">Ares stirs in the forge...</div>
    </div>

<script type="module">
const EDGE_BASE = 'https://kzcucjcyxybypncbdbws.supabase.co/functions/v1';
const sb = window.supabase.createClient(
    'https://kzcucjcyxybypncbdbws.supabase.co',
    'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw'
);

async function callAres() {
    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.textContent = "⚔ FORGING IN PROGRESS...";

    log("Calling Ares Edge Function...", "normal");

    try {
        const res = await fetch(`${EDGE_BASE}/ares-transform`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ limit: 120 })
        });

        const result = await res.json();

        if (result.success) {
            log(`✓ Forged ${result.triplets_forged} triplets from ${result.pairs_read} pairs`, "success");
            if (result.verb_classes_used?.length) {
                log(`Verbs used: ${result.verb_classes_used.join(' • ')}`, "success");
            }
        } else {
            log(`⚠ ${result.errors?.[0] || 'Unknown error'}`, "warn");
        }

        await loadRecentTriplets();

    } catch (err) {
        log(`Network Error: ${err.message}`, "err");
        console.error(err);
    }

    btn.disabled = false;
    btn.textContent = "⚔ CALL TO WAR — FETCH PAIRS";
}

async function loadRecentTriplets() {
    const { data, error } = await sb
        .from('svo_triplets')
        .select('*')
        .eq('source', 'ares')
        .order('created_at', { ascending: false })
        .limit(15);

    if (error) {
        console.error(error);
        return;
    }

    const grid = document.getElementById('tripletsGrid');
    document.getElementById('tripletsCount').textContent = data?.length || 0;

    if (!data?.length) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#666;">No triplets forged yet.</div>`;
        return;
    }

    grid.innerHTML = data.map(t => `
        <div class="triplet-card">
            <div class="svo">
                \( {t.subject} <span class="svo-verb"> \){t.verb}</span> ${t.object}
            </div>
            <small style="color:#aaa">
                ${t.archetypal_family} • 
                F:\( {t.fertility_score} C: \){t.coherence_score} M:${t.mythogenic_score}
            </small>
        </div>
    `).join('');
}

function log(msg, type = "normal") {
    const logEl = document.getElementById('log');
    const colors = { success: '#9f8', warn: '#fb8', err: '#f66', normal: '#aaa' };
    const time = new Date().toLocaleTimeString();
    logEl.innerHTML = `<span style="color:\( {colors[type]}">[ \){time}] ${msg}</span><br>` + logEl.innerHTML;
    
    if (logEl.children.length > 30) logEl.removeChild(logEl.lastChild);
}

// Init
document.getElementById('fetchBtn').onclick = callAres;
loadRecentTriplets();           // Load existing triplets on page load
setInterval(loadRecentTriplets, 15000); // Refresh every 15s
</script>
</body>
</html>
